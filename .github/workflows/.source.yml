#
# GitHub Actions workflow configuration.
#
# https://docs.github.com/en/actions/writing-workflows/workflow-syntax-for-github-actions
#

name: Build
on:
  workflow_call:
defaults:
  run:
    shell: nix develop --command bash -e {0}
jobs:
  client:
    name: Client
    permissions:
      contents: read
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      # Checkout.
      - uses: actions/checkout@v6
      # Install Nix + Magic Nix Cache.
      - uses: DeterminateSystems/nix-installer-action@main
        with:
          summarize: false
      - uses: DeterminateSystems/magic-nix-cache-action@main
      # Main.
      - run: |
          just release
  client-nix:
    name: Client (Nix)
    permissions:
      contents: read
    strategy:
      matrix:
        runs-on:
          # aarch64-darwin
          - macos-15
          # aarch64-linux
          - ubuntu-latest-arm
          # x86_64-darwin
          - macos-13
          # x86_64-linux
          - ubuntu-latest
    runs-on: ${{ matrix.runs-on }}
    steps:
      # Checkout.
      - uses: actions/checkout@v6
      # Install Nix + Magic Nix Cache.
      - uses: DeterminateSystems/nix-installer-action@main
        with:
          summarize: false
      - uses: DeterminateSystems/magic-nix-cache-action@main
      # Main.
      - run: |
          nix build .#amazon-ec2-ssh-utils
  infrastructure:
    name: Infrastructure
    permissions:
      contents: read
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infrastructure
    steps:
      # Checkout.
      - uses: actions/checkout@v6
      # Install Nix + Magic Nix Cache.
      - uses: DeterminateSystems/nix-installer-action@main
        with:
          summarize: false
      - uses: DeterminateSystems/magic-nix-cache-action@main
      # Main.
      - run: |
          just release
  tests:
    name: Tests
    permissions:
      contents: read
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tests
    steps:
      # Checkout.
      - uses: actions/checkout@v6
      # Install Nix + Magic Nix Cache.
      - uses: DeterminateSystems/nix-installer-action@main
        with:
          summarize: false
      - uses: DeterminateSystems/magic-nix-cache-action@main
      # Main.
      - run: |
          just release
  tests-nix:
    name: Tests (Nix)
    permissions:
      contents: read
    strategy:
      matrix:
        runs-on:
          # aarch64-darwin
          - macos-15
          # aarch64-linux
          - ubuntu-latest-arm
          # x86_64-darwin
          - macos-13
          # x86_64-linux
          - ubuntu-latest
    runs-on: ${{ matrix.runs-on }}
    steps:
      # Checkout.
      - uses: actions/checkout@v6
      # Install Nix + Magic Nix Cache.
      - uses: DeterminateSystems/nix-installer-action@main
        with:
          summarize: false
      - uses: DeterminateSystems/magic-nix-cache-action@main
      # Main.
      - run: |
          nix build .#amazon-ec2-ssh-utils-tests
  # TODO: Create + check a Homebrew formula derivation.
  #
  # 1. Create a Homebrew formula derivation.
  # 2. Create a nix-darwin configuration that installs Homebrew with nix-homebrew (https://github.com/zhaofengli/nix-homebrew) and installs the Homebrew formula derivation.
  # 3. Run `amazon-ec2-ssh-utils --help` to validate the install.
